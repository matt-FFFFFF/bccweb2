services:
  # ─── Azurite (Azure Storage emulator) ───────────────────────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: bccweb-azurite
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --debug /data/debug.log
      --loose
      --skipApiVersionCheck
    ports:
      - "10000:10000" # Blob
      - "10001:10001" # Queue
      - "10002:10002" # Table
    volumes:
      - ./.azurite:/data
    networks:
      - bccweb
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('net').connect(10000,'localhost',()=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ─── Init: create blob containers ────────────────────────────────────────────
  # Runs once, exits 0. Re-running is safe (container create is idempotent).
  azurite-init:
    image: node:24-alpine
    container_name: bccweb-azurite-init
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - bccweb
    volumes:
      - ./scripts/init-storage.mjs:/init-storage.mjs:ro
    environment:
      BLOB_HOST: azurite
    command: ["node", "/init-storage.mjs"]
    restart: "no"

  # ─── API (Azure Functions) ───────────────────────────────────────────────────
  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: bccweb-api
    depends_on:
      azurite-init:
        condition: service_completed_successfully
    environment:
      # Full Azurite connection strings — hostname is the compose service name
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      BLOB_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      BLOB_CONTAINER_NAME: data
      PURETRACK_ENABLED: "false"
      JWT_SECRET: dev-secret-change-in-production
      FUNCTIONS_WORKER_RUNTIME: node
      FUNCTIONS_NODE_BLOCK_ON_ENTRY_POINT_ERROR: "true"
      WEBSITE_SITE_NAME: bccweb-local
    ports:
      - "7071:80" # Expose for direct curl/Postman testing
    networks:
      - bccweb
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:80/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ─── Init: seed admin user + print credentials ──────────────────────────────
  # One-shot: runs after api is healthy, exits 0. Idempotent — re-running prints
  # "already exists". Writes plaintext password to STDERR (3x, yellow) and to
  # `.dev-credentials` on the host via bind-mount. Pre-condition: host file
  # `.dev-credentials` must exist (the `make dev` target / T16 will touch it).
  api-init:
    image: node:24-alpine
    container_name: bccweb-api-init
    depends_on:
      api:
        condition: service_healthy
    environment:
      BLOB_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
    volumes:
      # Source /scripts is read-only; copied into writable /workspace/scripts
      # at runtime so node can resolve relative imports (./lib/blobSeed.mjs etc.)
      - ./scripts:/scripts:ro
      # Read-write so seed-admin.mjs can write the generated password back to host.
      - ./.dev-credentials:/workspace/.dev-credentials
    working_dir: /workspace
    networks:
      - bccweb
    # Create a minimal in-container package.json (so npm has a workspace context)
    # rather than bind-mounting the host one as :ro. The host manifest is
    # read-only under podman virtiofs and npm wants to update it when ad-hoc
    # installing bcryptjs + @azure/storage-blob. --no-save and --no-package-lock
    # keep the install fully ephemeral.
    command: >
      sh -c "cp -r /scripts /workspace/scripts &&
             cd /workspace &&
             echo '{\"name\":\"bccweb-api-init\",\"private\":true}' > package.json &&
             npm install --no-save --no-package-lock --omit=dev --no-audit --no-fund bcryptjs @azure/storage-blob &&
             node /workspace/scripts/seed-admin.mjs"
    restart: "no"

  # ─── Web (React SPA via Caddy) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: bccweb-web
    depends_on:
      api:
        condition: service_healthy
      api-init:
        condition: service_completed_successfully
    ports:
      - "3000:80"
    networks:
      - bccweb
    restart: unless-stopped

networks:
  bccweb:
    driver: bridge
