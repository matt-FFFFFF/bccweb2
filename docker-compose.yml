services:
  # ─── Azurite (Azure Storage emulator) ───────────────────────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: bccweb-azurite
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --debug /data/debug.log
      --loose
      --skipApiVersionCheck
    ports:
      - "10000:10000" # Blob
      - "10001:10001" # Queue
      - "10002:10002" # Table
    volumes:
      - ./.azurite:/data
    networks:
      - bccweb
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('net').connect(10000,'localhost',()=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ─── Init: create blob containers ────────────────────────────────────────────
  # Runs once, exits 0. Re-running is safe (container create is idempotent).
  azurite-init:
    image: node:20-alpine
    container_name: bccweb-azurite-init
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - bccweb
    volumes:
      - ./scripts/init-storage.mjs:/init-storage.mjs:ro
    environment:
      BLOB_HOST: azurite
    command: ["node", "/init-storage.mjs"]
    restart: "no"

  # ─── API (Azure Functions) ───────────────────────────────────────────────────
  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: bccweb-api
    depends_on:
      azurite-init:
        condition: service_completed_successfully
    environment:
      # Full Azurite connection strings — hostname is the compose service name
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IkvFpEgBm+Nwj4gEWH9A3RoLOHKvPVZLqGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      BLOB_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      BLOB_CONTAINER_NAME: data
      JWT_SECRET: dev-secret-change-in-production
      FUNCTIONS_WORKER_RUNTIME: node
      FUNCTIONS_NODE_BLOCK_ON_ENTRY_POINT_ERROR: "true"
      WEBSITE_SITE_NAME: bccweb-local
    ports:
      - "7071:80" # Expose for direct curl/Postman testing
    networks:
      - bccweb
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:80/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ─── Web (React SPA via Caddy) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: bccweb-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - bccweb
    restart: unless-stopped

networks:
  bccweb:
    driver: bridge
