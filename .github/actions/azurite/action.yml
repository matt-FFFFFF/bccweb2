name: Start Azurite
description: Start Azurite and wait up to 60 seconds for it to become ready

runs:
  using: "composite"
  steps:
    - name: Start Azurite
      shell: bash
      run: |
        docker rm -f azurite >/dev/null 2>&1 || true
        docker run -d --name azurite -p 10000:10000 -p 10001:10001 \
          mcr.microsoft.com/azure-storage/azurite \
          azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --skipApiVersionCheck

    - name: Wait for Azurite
      shell: bash
      run: |
        for i in {1..30}; do
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:10000/devstoreaccount1?comp=list" || true)
          case "$code" in
            200|400|403) echo "Azurite ready after ${i} attempts (HTTP $code)"; exit 0 ;;
          esac
          echo "Attempt $i: Azurite not ready (HTTP ${code:-none}), sleeping 2s..."
          sleep 2
        done
        echo "::error::Azurite failed to become ready after 60s"
        exit 1
