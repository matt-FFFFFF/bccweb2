name: Terraform (manual)

on:
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        type: choice
        options: [shared, staging, prod]
      action:
        description: plan only, or plan then apply
        required: true
        type: choice
        options: [plan, apply]

permissions:
  id-token: write
  contents: read

concurrency: environment-${{ inputs.env }}

jobs:
  terraform:
    uses: ./.github/workflows/terraform-run.yml
    secrets: inherit
    with:
      root: ${{ inputs.env == 'shared' && 'shared' || 'environment' }}
      target_env: ${{ inputs.env }}
      mode: ${{ inputs.action }}
