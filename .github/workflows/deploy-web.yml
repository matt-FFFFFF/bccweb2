name: Deploy Web (SWA)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/types/**"
      - ".github/workflows/deploy-web.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Build packages/types
        run: npm run build --workspace packages/types

      - name: Build apps/web
        run: npm run build --workspace apps/web

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && 'close' || 'upload' }}
          app_location: "apps/web"
          output_location: "../../dist/web"
          skip_app_build: true
          # The Functions are deployed separately; SWA just proxies /api/*
          api_location: ""

      # NO auto-rollback: this smoke gate must fail the workflow so the operator
      # investigates immediately and performs any rollback manually in Azure Portal.
      - name: Smoke test
        if: ${{ success() }}
        env:
          WEB_HOST: ${{ vars.WEB_HOST }}
        run: |
          set -euo pipefail

          url="https://${WEB_HOST}/"
          headers_ok=0
          for _ in $(seq 1 24); do
            headers="$(curl -fsSI "$url" || true)"
            if printf '%s' "$headers" | grep -qi '^content-type: text/html'; then
              headers_ok=1
              break
            fi
            sleep 5
          done

          if [ "$headers_ok" -ne 1 ]; then
            echo "::error::Post-deploy smoke failed"
            exit 1
          fi

          if ! curl -fsS "$url" | grep -Eiq 'BCC'; then
            echo "::error::Post-deploy smoke failed"
            exit 1
          fi
