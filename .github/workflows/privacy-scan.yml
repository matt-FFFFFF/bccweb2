name: Privacy Scan

on:
  pull_request:
  push:
    branches:
      - main

# Least-privilege default: the scan only checks out the repo and reads blobs from
# a local Azurite. upload-artifact (on failure) needs no extra scope.
permissions:
  contents: read

jobs:
  privacy-scan:
    name: PII Leak Detection
    runs-on: ubuntu-latest

    env:
      BLOB_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start Azurite
        run: |
          docker rm -f azurite >/dev/null 2>&1 || true
          docker run -d --name azurite -p 10000:10000 -p 10001:10001 mcr.microsoft.com/azure-storage/azurite azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --skipApiVersionCheck

      - name: Wait for Azurite
        run: |
          for i in {1..30}; do
            if curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:10000/devstoreaccount1?comp=list 2>/dev/null | grep -qE "^(200|403|400)$"; then
              echo "Azurite ready after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i: Azurite not ready, sleeping 2s..."
            sleep 2
          done
          echo "::error::Azurite failed to become ready after 60s"
          exit 1

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: npm ci

      - name: Create Azurite containers
        run: node scripts/init-storage.mjs

      - name: Seed public container with clean test data
        # Upload representative public blobs that contain no PII fields.
        # This seeds the same shape that the live migration produces post-T21.
        run: |
          node - <<'EOF'
          import { BlobServiceClient } from "@azure/storage-blob";

          const cs = process.env.BLOB_CONNECTION_STRING;
          const svc = BlobServiceClient.fromConnectionString(cs);
          const pub = svc.getContainerClient("data");

          const blobs = {
            "pilots.json": JSON.stringify([
              { id: "pilot-uuid-1", name: "Alice Smith", clubId: "club-1", rating: "Pilot" },
              { id: "pilot-uuid-2", name: "Bob Jones",  clubId: "club-1", rating: "Club Pilot" }
            ], null, 2),
            "clubs.json": JSON.stringify([
              { id: "club-1", name: "Acme Hang Gliding Club" }
            ], null, 2),
            "rounds.json": JSON.stringify([
              { id: "round-1", date: "2024-06-01", status: "Complete", seasonYear: 2024, siteId: "site-1", siteName: "Mam Tor" }
            ], null, 2),
            "seasons.json": JSON.stringify([
              { id: "season-2024", year: 2024, active: true }
            ], null, 2),
            "manufacturers.json": JSON.stringify([
              { id: "m1", legacyId: 1, name: "Ozone", websiteUrl: "https://flyozone.com" },
              { id: "m2", name: "Gin Gliders" }
            ], null, 2),
          };

          for (const [name, content] of Object.entries(blobs)) {
            const client = pub.getBlockBlobClient(name);
            await client.upload(content, Buffer.byteLength(content), {
              blobHTTPHeaders: { blobContentType: "application/json" },
            });
            console.log("seeded:", name);
          }
          EOF

      - name: Run privacy scanner
        run: node scripts/privacy-scan.mjs

      - name: Upload scan report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: privacy-scan-failure
          path: |
            .omo/evidence/
          if-no-files-found: ignore
