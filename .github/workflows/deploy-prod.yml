name: Deploy prod

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency: environment-prod

jobs:
  verify-release-ancestry:
    name: Verify release ancestry
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check release commit is reachable from main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  env-drift:
    needs: verify-release-ancestry
    uses: ./.github/workflows/terraform-run.yml
    with:
      root: environment
      target_env: prod
      mode: drift-gate
    secrets: inherit

  shared-drift:
    needs: verify-release-ancestry
    uses: ./.github/workflows/terraform-run.yml
    with:
      root: shared
      target_env: shared
      mode: drift-gate
    secrets: inherit

  deploy:
    needs: [verify-release-ancestry, env-drift, shared-drift]
    uses: ./.github/workflows/deploy-app.yml
    with:
      environment: prod
      swa_environment_name: ""
      is_production: true
    secrets: inherit
