name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default for every job: these jobs only read the repo (build,
# test, lint, docker builds) — none write contents, comment, push images, or use
# OIDC. Individual jobs can widen this if they ever need more.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0. Typecheck ──────────────────────────────────────────────────────────────
  # tsc --noEmit across all workspaces. Dependents resolve @bccweb/* from dist/,
  # so the shared packages must be built first (types → schemas → scoring).
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node with mise
        uses: ./.github/actions/setup-node-mise
        with:
          build: build-types build-schemas build-scoring

      - name: Typecheck
        run: make typecheck

  # ── Lint ──────────────────────────────────────────────────────────────────────
  # Repo-wide ESLint: per-workspace lint scripts (npm run lint --workspaces --if-present)
  # plus root eslint for tests/e2e + scripts. Build shared packages first so the
  # @bccweb/* type declarations resolve for apps/api's type-aware rules.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node with mise
        uses: ./.github/actions/setup-node-mise
        with:
          build: build-types build-schemas build-scoring

      - name: SPDX header unit tests
        run: node --test scripts/__tests__/spdx-header.test.mjs

      - name: Run load-test contract tests
        run: npm run loadtest:test

      - name: Lint
        run: npm run lint

  # ── 1. Tests ───────────────────────────────────────────────────────────────────
  # API integration tests talk to Azurite on 127.0.0.1:10000 (the connection
  # string is defaulted in apps/api/src/__tests__/helpers/setup.ts). Each API test
  # file provisions its own per-file containers, so no seeding is required here.
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start Azurite
        uses: ./.github/actions/azurite

      # Built dist/ is required: API tests resolve @bccweb/* from dist/.
      - name: Set up Node with mise
        uses: ./.github/actions/setup-node-mise
        with:
          build: build

      # scripts/migrate is a standalone package outside the npm workspaces, with
      # its own package-lock.json. Install it separately so that lockfile drift
      # is caught by `npm ci`, and its node:test smoke suite can run locally.
      - name: Install migration script dependencies
        run: npm ci
        working-directory: scripts/migrate

      - name: Run tests
        run: make test

      - name: Run fixture transaction tests
        run: npm run fixtures:test

      - name: Run admin script tests
        run: npm run admin:test

      # The three heavy/slow API lib tests are excluded from `make test`; CI can
      # afford the extra minute, so cover them here while Azurite is already up.
      - name: Run heavy tests
        run: make test-heavy

  # ── Terraform contracts ────────────────────────────────────────────────────────
  # Offline-only: mocked unit suites, fixture parity, and static resource contracts.
  # Authenticated plan-only integration tests remain an operator-invoked check.
  terraform-contracts:
    name: Terraform contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform with mise
        uses: ./.github/actions/setup-node-mise

      - name: Check stamp fixture sync
        run: diff -r --exclude=keyvault.tf --exclude=variables.tf --exclude=README.md iac/environment/modules/stamp iac/environment/tests/unit/stamp-fixture

      - name: Run environment Terraform unit tests
        run: |
          terraform -chdir=iac/environment init -backend=false -test-directory=tests/unit
          terraform -chdir=iac/environment test -test-directory=tests/unit

      - name: Run shared Terraform unit tests
        run: |
          terraform -chdir=iac/shared init -backend=false -test-directory=tests/unit
          terraform -chdir=iac/shared test -test-directory=tests/unit

      - name: Run bootstrap Terraform unit tests
        run: |
          if ! cmp -s iac/bootstrap/terraform.tfvars iac/bootstrap/terraform.tfvars.example; then
            echo "Bootstrap terraform.tfvars and terraform.tfvars.example must remain byte-identical." >&2
            exit 1
          fi
          terraform -chdir=iac/bootstrap init -backend=false -test-directory=tests/unit
          terraform -chdir=iac/bootstrap validate
          terraform -chdir=iac/bootstrap test -test-directory=tests/unit
          terraform fmt -check -recursive iac/

      - name: Check Terraform workflow var-file contract
        shell: bash
        run: |
          set -euo pipefail
          workflow=.github/workflows/terraform-run.yml
          if grep -Fq "TF_VAR_env_umi_principal_ids" "$workflow"; then
            echo "terraform-run.yml must not map the UMI principal IDs through GitHub." >&2
            exit 1
          fi
          test "$(grep -Ec "TF_CLI_ARGS_plan: .*inputs\.root == 'shared'.*-var-file=\.\./env/shared\.generated\.tfvars" "$workflow")" -eq 1
          test "$(grep -Fc -- "-var-file=\"../env/\${TARGET_ENV}.tfvars\"" "$workflow")" -eq 3
          test "$(grep -Fc "terraform -chdir=\"iac/\${ROOT}\" apply -input=false tfplan" "$workflow")" -eq 1

      - name: Check deploy backend query contract
        shell: bash
        run: |
          set -euo pipefail
          workflow=.github/workflows/deploy-app.yml
          test "$(grep -Fc -- "--query 'backendResourceId'" "$workflow")" -eq 1
          if grep -Fq -- "--query '[0].backendResourceId'" "$workflow"; then
            echo "deploy-app.yml must query the singular backend object, not an array element." >&2
            exit 1
          fi

      - name: Check committed tfvars are non-secret
        shell: bash
        run: |
          files=(iac/bootstrap/terraform.tfvars iac/env/shared.tfvars iac/env/staging.tfvars iac/env/prod.tfvars)
          forbidden='ops_email|puretrack_api_key|puretrack_email|puretrack_password|slack_webhook_url|terraform_principal_type'
          failed=0
          while IFS=: read -r path key; do
            printf '%s:%s\n' "$path" "$key"
            failed=1
          done < <(grep -EHn "^[[:space:]]*(${forbidden})[[:space:]]*=" "${files[@]}" | sed -E 's/^([^:]+):[0-9]+:[[:space:]]*([^[:space:]=]+).*/\1:\2/' || true)
          while IFS=: read -r path key; do
            printf '%s:%s\n' "$path" "$key"
            failed=1
          done < <(grep -FHn '<REQUIRED' "${files[@]}" | sed -nE 's/^([^:]+):[0-9]+:[[:space:]]*([[:alnum:]_]+)[[:space:]]*=.*/\1:\2/p' || true)
          exit "$failed"

      - name: Check workload location contract
        run: bash scripts/iac/check-workload-location-contract.sh

      - name: Check shared Terraform resource contract
        run: bash scripts/iac/check-shared-resource-contract.sh

      - name: Check stamp storage split contract
        run: bash scripts/iac/check-stamp-storage-split.sh

  # ── 2. Docker builds ────────────────────────────────────────────────────────────
  # Build every image that docker-compose builds locally (apps/api/Dockerfile.dev
  # and apps/web/Dockerfile.dev). `docker compose build` builds exactly the
  # services that declare a `build:` context, keeping this in lockstep with
  # docker-compose.yml. Azurite / init images are pulled, not built.
  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build compose images
        run: docker compose build
