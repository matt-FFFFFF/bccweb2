name: Deploy application

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      swa_environment_name:
        required: false
        type: string
        default: ""
      is_production:
        required: false
        type: boolean
        default: false

jobs:
  deploy-api:
    name: Deploy API (Functions)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies and build API
        uses: ./.github/actions/setup-node-mise
        with:
          build: build-api

      - name: Prepare deployment package
        run: |
          set -euo pipefail
          npm prune --omit=dev

          mkdir -p .deploy
          cp apps/api/host.json apps/api/package.json .deploy/
          cp -r apps/api/dist .deploy/dist
          rsync -a --copy-links node_modules/ .deploy/node_modules/
          # Required overlay: npm leaves some @bccweb/api PROD deps un-hoisted under
          # apps/api/node_modules (e.g. puppeteer-core). Flex ships node_modules as-is
          # (remoteBuild=false); without this the entry point hits ERR_MODULE_NOT_FOUND
          # and the host indexes zero functions. Do not remove.
          if [ -d apps/api/node_modules ]; then
            rsync -a --copy-links apps/api/node_modules/ .deploy/node_modules/
          fi

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1.5.6
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: .deploy
          sku: flexconsumption

  deploy-web:
    name: Deploy Web (SWA)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      VITE_BLOB_BASE_URL: ${{ vars.VITE_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install dependencies and build web
        uses: ./.github/actions/setup-node-mise
        with:
          build: build-web

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token
        id: swa_token
        run: |
          set -euo pipefail
          token="$(az staticwebapp secrets list \
            --name swa-bccweb-shared \
            --resource-group "${{ vars.SHARED_RG_NAME }}" \
            --query "properties.apiKey" \
            -o tsv)"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy named Azure Static Web Apps environment
        if: inputs.swa_environment_name != ''
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: upload
          app_location: "apps/web"
          output_location: "../../dist/web"
          skip_app_build: true
          api_location: ""
          deployment_environment: ${{ inputs.swa_environment_name }}

      - name: Deploy default Azure Static Web Apps environment
        if: inputs.swa_environment_name == ''
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: upload
          app_location: "apps/web"
          output_location: "../../dist/web"
          skip_app_build: true
          api_location: ""

  link-backend:
    name: Link SWA backend and smoke test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [deploy-api, deploy-web]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token
        run: |
          set -euo pipefail
          token="$(az staticwebapp secrets list \
            --name swa-bccweb-shared \
            --resource-group "${{ vars.SHARED_RG_NAME }}" \
            --query "properties.apiKey" \
            -o tsv)"
          echo "::add-mask::$token"

      - name: Link Function App backend
        env:
          SWA_ENVIRONMENT_NAME: ${{ inputs.swa_environment_name }}
        run: |
          set -euo pipefail

          function_id="$(az functionapp show \
            -n "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
            -g "${{ vars.TF_VAR_STAMP_RG_NAME }}" \
            --query id \
            -o tsv)"

          environment_args=()
          if [[ -n "$SWA_ENVIRONMENT_NAME" ]]; then
            environment_args+=(--environment-name "$SWA_ENVIRONMENT_NAME")
          fi

          current="$(az staticwebapp backends show \
            --name swa-bccweb-shared \
            --resource-group "${{ vars.SHARED_RG_NAME }}" \
            --query 'backendResourceId' \
            -o tsv \
            "${environment_args[@]}" 2>/dev/null || true)"

          if [[ "$current" == "$function_id" ]]; then
            echo "backend already linked to ${function_id}; no-op"
          else
            if [[ -n "$current" ]]; then
              az staticwebapp backends unlink \
                --name swa-bccweb-shared \
                --resource-group "${{ vars.SHARED_RG_NAME }}" \
                --remove-backend-auth true \
                "${environment_args[@]}"
            fi

            az staticwebapp backends link \
              --name swa-bccweb-shared \
              --resource-group "${{ vars.SHARED_RG_NAME }}" \
              --backend-resource-id "$function_id" \
              --backend-region "${{ vars.AZURE_LOCATION }}" \
              "${environment_args[@]}"
          fi

      - name: Smoke test through SWA
        env:
          SWA_ENVIRONMENT_NAME: ${{ inputs.swa_environment_name }}
        run: |
          set -euo pipefail

          if [[ -n "$SWA_ENVIRONMENT_NAME" ]]; then
            swa_host="$(az staticwebapp environment show \
              --name swa-bccweb-shared \
              --resource-group "${{ vars.SHARED_RG_NAME }}" \
              --environment-name "$SWA_ENVIRONMENT_NAME" \
              --query hostname \
              -o tsv)"
          else
            swa_host="$(az staticwebapp show \
              --name swa-bccweb-shared \
              --resource-group "${{ vars.SHARED_RG_NAME }}" \
              --query defaultHostname \
              -o tsv)"
          fi

          health_ok=0
          for _ in $(seq 1 24); do
            body="$(curl -fsS "https://${swa_host}/api/health" || true)"
            if printf '%s' "$body" | jq -e '.status == "ok"' >/dev/null 2>&1; then
              health_ok=1
              break
            fi
            sleep 5
          done

          if [[ "$health_ok" -ne 1 ]]; then
            echo "::error::SWA-routed health smoke failed"
            exit 1
          fi

          if ! curl -fsS "https://${swa_host}/api/seasons" | jq -e 'type == "array"' >/dev/null; then
            echo "::error::SWA-routed seasons smoke failed"
            exit 1
          fi

          root_url="https://${swa_host}/"
          headers_ok=0
          for _ in $(seq 1 24); do
            headers="$(curl -fsSI "$root_url" || true)"
            if printf '%s' "$headers" | grep -qi '^content-type: text/html'; then
              headers_ok=1
              break
            fi
            sleep 5
          done

          if [[ "$headers_ok" -ne 1 ]]; then
            echo "::error::SWA web content-type smoke failed"
            exit 1
          fi

          if ! curl -fsS "$root_url" | grep -Eiq 'BCC'; then
            echo "::error::SWA web content smoke failed"
            exit 1
          fi

      - name: Smoke test production hostname
        if: inputs.is_production && vars.WEB_HOST != ''
        env:
          WEB_HOST: ${{ vars.WEB_HOST }}
        run: |
          set -euo pipefail

          health_ok=0
          for _ in $(seq 1 24); do
            body="$(curl -fsS "https://${WEB_HOST}/api/health" || true)"
            if printf '%s' "$body" | jq -e '.status == "ok"' >/dev/null 2>&1; then
              health_ok=1
              break
            fi
            sleep 5
          done

          if [[ "$health_ok" -ne 1 ]]; then
            echo "::error::Production-host health smoke failed"
            exit 1
          fi

          if ! curl -fsS "https://${WEB_HOST}/api/seasons" | jq -e 'type == "array"' >/dev/null; then
            echo "::error::Production-host seasons smoke failed"
            exit 1
          fi

          root_url="https://${WEB_HOST}/"
          headers_ok=0
          for _ in $(seq 1 24); do
            headers="$(curl -fsSI "$root_url" || true)"
            if printf '%s' "$headers" | grep -qi '^content-type: text/html'; then
              headers_ok=1
              break
            fi
            sleep 5
          done

          if [[ "$headers_ok" -ne 1 ]]; then
            echo "::error::Production-host web content-type smoke failed"
            exit 1
          fi

          if ! curl -fsS "$root_url" | grep -Eiq 'BCC'; then
            echo "::error::Production-host web content smoke failed"
            exit 1
          fi
